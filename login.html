<!DOCTYPE html>
<html lang="en" id="htmlTag" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Login | ARKI VIZ - 3D Architectural Rendering Studio</title>
    <link rel="icon" type="images/jpg" href="images/arki_viz_logo3.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        primary: '#c17b4c',
                        secondary: '#a5653a'
                    }
                } 
            }
        }
    </script>
    <style>
        * {
            font-family: 'Inter', sans-serif !important;
            transition: background-color 0.3s ease, border-color 0.3s ease, transform 0.2s ease;
        }
        
        body { 
            background: #F5F2F0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 12px;
        }
        
        .dark body {
            background: #1E1A17;
        }

        /* Logo - Primary Color Gradient */
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            padding: 8px 16px;
            justify-content: center;
            text-decoration: none;
        }
        
        .logo:hover {
            transform: scale(1.05);
        }
        
        .action-btn {
            padding: 8px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(193, 123, 76, 0.1);
            border: 1px solid #e5e7eb;
            color: #c17b4c;
            transition: all 0.3s ease;
            min-width: 36px;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .dark .action-btn {
            background: #2A241F;
            border-color: rgba(193, 123, 76, 0.3);
            color: #c17b4c;
        }
        
        .action-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(193, 123, 76, 0.2);
        }

        /* Icon visibility for dark mode */
        .dark .dark\:hidden {
            display: none;
        }
        
        .dark .hidden.dark\:block {
            display: block;
        }
        
        .dark\:block {
            display: none;
        }
        
        .dark .dark\:block {
            display: block;
        }
        
        .dark .dark\:hidden {
            display: none;
        }

        /* Fix for Font Awesome icons */
        .fab, .fas, .far {
            font-family: 'Font Awesome 6 Brands' !important;
            font-weight: 400;
        }
        
        .fas {
            font-family: 'Font Awesome 6 Free' !important;
            font-weight: 900;
        }
        
        .fa-left-right::before {
            content: "\f07e";
        }
        
        /* Improved dark mode text contrast */
        .dark .text-gray-500 {
            color: #D1D5DB !important;
        }
        
        .dark .text-gray-400 {
            color: #9CA3AF !important;
        }
        
        .dark .text-gray-600 {
            color: #D1D5DB !important;
        }
        
        .dark .border-gray-200 {
            border-color: #374151 !important;
        }
        
        .dark .bg-amber-50 {
            background-color: #374151 !important;
        }
        
        /* Keep placeholder text readable in dark mode */
        .dark input::placeholder {
            color: #9CA3AF !important;
        }
        
        /* Ensure modal dark mode text is readable */
        .dark .bg-white\:dark\:bg-\[2A241F\] {
            background-color: #2A241F;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-amber-50 to-stone-100 dark:from-[#1E1A17] dark:to-[#2A241F]">
    
    <!-- Top Right Controls - With Working Icons -->
    <div class="fixed top-3 right-3 sm:top-4 sm:right-4 md:top-5 md:right-5 z-50">
        <div class="desktop-menu flex items-center gap-2 bg-white/80 dark:bg-gray-800/80 backdrop-blur-sm p-1.5 rounded-xl shadow-lg border border-primary/20 dark:border-primary/30">
            <button onclick="toggleDirection()" class="action-btn" title="Toggle Direction">
                <i class="fas fa-arrows-left-right"></i>
            </button>
            <button onclick="toggleTheme()" class="action-btn" title="Toggle Theme">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:block"></i>
            </button>
        </div>
    </div>

    <!-- Login Card - Responsive -->
    <div class="w-full max-w-[90%] sm:max-w-[380px] md:max-w-[400px] lg:max-w-[420px] mx-auto">
        <div class="bg-white dark:bg-[#2A241F] rounded-xl sm:rounded-2xl shadow-xl border border-primary/20 dark:border-primary/30 p-5 sm:p-6 md:p-7">
            
            <!-- Logo - ARKI VIZ with Gradient -->
            <div class="flex justify-center mb-6 sm:mb-7 md:mb-8">
                <a href="index.html" class="logo">
                    <i class="fas fa-cube text-2xl sm:text-2xl md:text-3xl text-primary"></i>
                    <span class="font-black text-2xl sm:text-2xl md:text-2xl bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">ARKI VIZ</span>
                </a>
            </div>
            
            <!-- Title -->
            <h1 class="text-xl sm:text-xl md:text-2xl font-black text-center text-gray-900 dark:text-white mb-2">
                Welcome <span class="text-primary">Back</span>
            </h1>
            
            <!-- Subtitle -->
            <p class="text-center text-[10px] sm:text-xs md:text-sm text-gray-500 dark:text-gray-300 mb-5 sm:mb-6 md:mb-7">
                Sign in to continue to your account
            </p>
            
            <!-- Form -->
            <form id="loginForm" class="space-y-4 sm:space-y-5">
                <!-- Email Field with Icon -->
                <div>
                    <label class="text-[9px] sm:text-[10px] md:text-xs font-black text-primary uppercase tracking-wider block mb-1 ml-1">
                        <i class="fas fa-envelope mr-1 text-xs"></i>
                        Email Address
                    </label>
                    <input type="email" id="loginEmail" placeholder="studio@arkiviz.com" 
                           class="w-full px-3 sm:px-4 py-2.5 sm:py-3 bg-amber-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-xs sm:text-sm text-gray-900 dark:text-white focus:border-primary focus:outline-none transition-all placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:ring-2 focus:ring-primary/20">
                </div>
                
                <!-- Password Field with Icon -->
                <div>
                    <label class="text-[9px] sm:text-[10px] md:text-xs font-black text-primary uppercase tracking-wider block mb-1 ml-1">
                        <i class="fas fa-lock mr-1 text-xs"></i>
                        Password
                    </label>
                    <div class="relative">
                        <input type="password" id="loginPassword" placeholder="Enter your password" 
                               class="w-full px-3 sm:px-4 py-2.5 sm:py-3 bg-amber-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-xs sm:text-sm text-gray-900 dark:text-white focus:border-primary focus:outline-none transition-all pr-9 sm:pr-10 placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:ring-2 focus:ring-primary/20">
                        <button type="button" onclick="togglePassword()" class="absolute right-2 sm:right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary dark:text-gray-400 dark:hover:text-primary">
                            <i id="passwordIcon" class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <!-- Remember Me & Forgot Password -->
                <div class="flex flex-row xs:flex-row items-start xs:items-center justify-between gap-3 xs:gap-0">
                    <label class="flex items-center gap-1.5 sm:gap-2 cursor-pointer group">
                        <input type="checkbox" class="accent-primary w-3.5 h-3.5 sm:w-4 sm:h-4 rounded">
                        <span class="text-[10px] sm:text-xs md:text-sm text-gray-700 dark:text-gray-300 group-hover:text-primary transition-colors">Remember me</span>
                    </label>
                    <a href="#" onclick="showForgotModal()" class="text-[10px] sm:text-xs md:text-sm font-bold text-primary hover:underline hover:scale-105 transition-all">
                        Forgot password?
                    </a>
                </div>
                
                <!-- Login Button -->
                <button type="submit" class="w-full bg-gradient-to-r from-primary to-secondary hover:from-primary/90 hover:to-secondary/90 text-white font-bold py-2.5 sm:py-3 md:py-3.5 px-4 rounded-lg transition-all shadow-md text-xs sm:text-sm md:text-base mt-2 transform hover:scale-[1.02]">
                    <i class="fas fa-sign-in-alt mr-2"></i>
                    Log In
                </button>
            </form>
            
            <!-- Divider -->
            <div class="relative my-5 sm:my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
                </div>
                <div class="relative flex justify-center text-[9px] sm:text-[10px] md:text-xs">
                    <span class="bg-white dark:bg-[#2A241F] px-3 text-gray-500 dark:text-gray-400">or continue with</span>
                </div>
            </div>
            
            <!-- Social Icons with Names - Consistent primary color on hover -->
            <div class="grid grid-cols-3 gap-2 sm:gap-3 mb-5 sm:mb-6">
                <button onclick="socialLogin('google')" class="flex items-center justify-center gap-1 sm:gap-2 p-2 sm:p-2.5 md:p-3 border border-gray-200 dark:border-gray-700 rounded-lg hover:border-primary hover:text-primary transition-all group">
                    <i class="fab fa-google text-sm sm:text-base md:text-lg text-gray-600 dark:text-gray-400 group-hover:text-primary"></i>
                    <span class="text-[9px] sm:text-[10px] md:text-xs font-medium text-gray-600 dark:text-gray-300 group-hover:text-primary">Google</span>
                </button>
                <button onclick="socialLogin('apple')" class="flex items-center justify-center gap-1 sm:gap-2 p-2 sm:p-2.5 md:p-3 border border-gray-200 dark:border-gray-700 rounded-lg hover:border-primary hover:text-primary transition-all group">
                    <i class="fab fa-apple text-sm sm:text-base md:text-lg text-gray-600 dark:text-gray-400 group-hover:text-primary"></i>
                    <span class="text-[9px] sm:text-[10px] md:text-xs font-medium text-gray-600 dark:text-gray-300 group-hover:text-primary">Apple</span>
                </button>
                <button onclick="socialLogin('facebook')" class="flex items-center justify-center gap-1 sm:gap-2 p-2 sm:p-2.5 md:p-3 border border-gray-200 dark:border-gray-700 rounded-lg hover:border-primary hover:text-primary transition-all group">
                    <i class="fab fa-facebook-f text-sm sm:text-base md:text-lg text-gray-600 dark:text-gray-400 group-hover:text-primary"></i>
                    <span class="text-[9px] sm:text-[10px] md:text-xs font-medium text-gray-600 dark:text-gray-300 group-hover:text-primary">Facebook</span>
                </button>
            </div>
            
            <!-- Sign Up Link -->
            <p class="text-center text-[10px] sm:text-xs md:text-sm text-gray-500 dark:text-gray-300">
                Don't have an account? 
                <a href="signup.html" class="text-primary font-bold hover:underline hover:scale-105 inline-block transition-all">
                    Create new account
                </a>
            </p>

            <!-- Footer -->
            <p class="text-center text-[8px] sm:text-[9px] md:text-xs text-gray-400 dark:text-gray-500 mt-4 sm:mt-5">
                © 2026 ARKI VIZ Studio. All rights reserved.
            </p>
        </div>
    </div>

    <!-- Forgot Password Modal - Consistent brand colors -->
    <div id="forgotModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[2000] hidden items-center justify-center">
        <div class="bg-white dark:bg-[#2A241F] rounded-xl max-w-[90%] sm:max-w-[380px] w-full p-5 sm:p-6 border border-primary/20 dark:border-primary/30">
            <div class="text-center mb-4">
                <i class="fas fa-key text-4xl text-primary mb-2"></i>
                <h3 class="text-xl font-bold text-gray-900 dark:text-white">Reset Password</h3>
                <p class="text-sm text-gray-500 dark:text-gray-300 mt-1">Enter your email to receive reset instructions</p>
            </div>
            <input type="email" id="resetEmail" class="w-full px-3 sm:px-4 py-2.5 sm:py-3 bg-amber-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-sm text-gray-900 dark:text-white focus:border-primary focus:outline-none mb-4" placeholder="your@email.com">
            <div class="flex gap-3">
                <button onclick="closeForgotModal()" class="flex-1 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 transition">Cancel</button>
                <button onclick="sendResetLink()" class="flex-1 py-2 bg-primary text-white rounded-lg hover:bg-secondary transition">Send Reset Link</button>
            </div>
        </div>
    </div>

    <script>
        // Theme Toggle Function
        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('darkMode', html.classList.contains('dark') ? 'dark' : 'light');
        }

        // Check saved dark mode
        if (localStorage.getItem('darkMode') === 'dark') {
            document.documentElement.classList.add('dark');
        }

        // Direction Toggle
        function toggleDirection() {
            const html = document.getElementById('htmlTag');
            html.dir = html.dir === 'ltr' ? 'rtl' : 'ltr';
        }

        // Password Visibility Toggle
        function togglePassword() {
            const password = document.getElementById('loginPassword');
            const icon = document.getElementById('passwordIcon');
            
            if (password.type === 'password') {
                password.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                password.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        // Forgot Password Modal Functions
        function showForgotModal() {
            document.getElementById('forgotModal').style.display = 'flex';
        }
        
        function closeForgotModal() {
            document.getElementById('forgotModal').style.display = 'none';
        }
        
        function sendResetLink() {
            const email = document.getElementById('resetEmail').value;
            if(email && email.includes('@')) {
                alert(`Password reset link sent to ${email}`);
                closeForgotModal();
                document.getElementById('resetEmail').value = '';
            } else {
                alert('Please enter a valid email address');
            }
        }
        
        // Social Login
        function socialLogin(provider) {
            alert(`Login with ${provider} would redirect to OAuth. Demo mode: redirecting to dashboard.`);
            window.location.href = 'user.html';
        }
        
        // Initialize any required scripts
        document.addEventListener('DOMContentLoaded', function() {
            // Ensure dark mode icon is correct on load
            if (document.documentElement.classList.contains('dark')) {
                // Already handled by CSS
            }
        });
        
        // Login Form Submit
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if(email && password) {
                if(email === 'admin@arkiviz.com' && password === 'admin123') {
                    window.location.href = 'admin.html';
                } else if(email && password) {
                    window.location.href = 'user.html';
                } else {
                    alert('Invalid credentials. Demo: Use any email/password to continue as user.');
                }
            } else {
                alert('Please fill in all fields');
            }
        });
    </script>
</body>
</html>
