<!DOCTYPE html>
<html lang="en" id="htmlTag" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Sign Up | ARKI VIZ - 3D Architectural Rendering Studio</title>
    <link rel="icon" type="images/jpg" href="images/arki_viz_logo3.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        primary: '#c17b4c',
                        secondary: '#a5653a'
                    }
                } 
            }
        }
    </script>
    <style>
        * {
            font-family: 'Inter', sans-serif !important;
            transition: background-color 0.3s ease, border-color 0.3s ease, transform 0.2s ease;
        }
        
        body { 
            background: #F5F2F0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 12px;
        }
        
        .dark body {
            background: #1E1A17;
        }

        /* Logo - Primary Color Gradient */
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            padding: 8px 16px;
            justify-content: center;
            text-decoration: none;
        }
        
        .logo:hover {
            transform: scale(1.05);
        }
        
        .action-btn {
            padding: 8px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(193, 123, 76, 0.1);
            border: 1px solid #e5e7eb;
            color: #c17b4c;
            transition: all 0.3s ease;
            min-width: 36px;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .dark .action-btn {
            background: #2A241F;
            border-color: #4b5563;
            color: #d69462;
        }
        
        .action-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(193, 123, 76, 0.2);
        }

        /* Icon visibility for dark mode */
        .dark .dark\:hidden {
            display: none;
        }
        
        .dark .hidden.dark\:block {
            display: block;
        }
        
        .dark\:block {
            display: none;
        }
        
        .dark .dark\:block {
            display: block;
        }
        
        .dark .dark\:hidden {
            display: none;
        }

        /* Fix for Font Awesome icons */
        .fab, .fas, .far {
            font-family: 'Font Awesome 6 Brands' !important;
            font-weight: 400;
        }
        
        .fas {
            font-family: 'Font Awesome 6 Free' !important;
            font-weight: 900;
        }
        
        .fa-left-right::before {
            content: "\f07e";
        }
        
        /* No scroll - perfect fit */
       
        
        /* Password Strength Bar */
        .strength-bar {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-amber-50 to-stone-100 dark:from-[#1E1A17] dark:to-[#2A241F]">
    
    <!-- Top Right Controls - With Working Icons -->
    <div class="fixed top-3 right-3 sm:top-4 sm:right-4 md:top-5 md:right-5 z-50">
        <div class="desktop-menu flex items-center gap-2 bg-white/80 dark:bg-gray-800/80 backdrop-blur-sm p-1.5 rounded-xl shadow-lg border border-amber-200 dark:border-gray-700">
            <button onclick="toggleDirection()" class="action-btn" title="Toggle Direction">
                <i class="fas fa-arrows-left-right"></i>
            </button>
            <button onclick="toggleTheme()" class="action-btn" title="Toggle Theme">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:block"></i>
            </button>
        </div>
    </div>

    <!-- Signup Card - Responsive -->
    <div class="w-full max-w-[90%] sm:max-w-[400px] md:max-w-[420px] lg:max-w-[440px] mx-auto">
        <div class="bg-white dark:bg-[#2A241F] rounded-xl sm:rounded-2xl shadow-xl border border-amber-200 dark:border-gray-700 p-5 sm:p-6 md:p-7">
            
            <!-- Logo - ARKI VIZ with Gradient -->
            <div class="flex justify-center mb-5 sm:mb-6 md:mb-7">
                <a href="index.html" class="logo">
                    <i class="fas fa-cube text-2xl sm:text-2xl md:text-3xl" style="color: #c17b4c;"></i>
                    <span class="font-black text-2xl sm:text-2xl md:text-2xl bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">ARKI VIZ</span>
                </a>
            </div>
            
            <!-- Title -->
            <h1 class="text-xl sm:text-xl md:text-2xl font-black text-center text-gray-900 dark:text-white mb-2">
                Create <span class="text-primary">Account</span>
            </h1>
            
            <!-- Subtitle -->
            <p class="text-center text-[10px] sm:text-xs md:text-sm text-gray-500 dark:text-gray-400 mb-5 sm:mb-6 md:mb-7">
                Join ARKI VIZ and start visualizing your architectural projects
            </p>
            
            <!-- Form -->
            <form id="signupForm" class="space-y-3 sm:space-y-4">
                <!-- Full Name Field -->
                <div>
                    <label class="text-[9px] sm:text-[10px] md:text-xs font-black text-primary uppercase tracking-wider block mb-1 ml-1">
                        <i class="fas fa-user mr-1 text-xs"></i>
                        Full Name
                    </label>
                    <input type="text" id="fullName" placeholder="John Doe" 
                           class="w-full px-3 sm:px-4 py-2.5 sm:py-3 bg-amber-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-xs sm:text-sm focus:border-primary focus:outline-none transition-all placeholder:text-gray-400 focus:ring-2 focus:ring-primary/20">
                </div>
                
                <!-- Email Field with Icon -->
                <div>
                    <label class="text-[9px] sm:text-[10px] md:text-xs font-black text-primary uppercase tracking-wider block mb-1 ml-1">
                        <i class="fas fa-envelope mr-1 text-xs"></i>
                        Email Address
                    </label>
                    <input type="email" id="signupEmail" placeholder="studio@arkiviz.com" 
                           class="w-full px-3 sm:px-4 py-2.5 sm:py-3 bg-amber-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-xs sm:text-sm focus:border-primary focus:outline-none transition-all placeholder:text-gray-400 focus:ring-2 focus:ring-primary/20">
                </div>
                
                <!-- Password Field with Icon -->
                <div>
                    <label class="text-[9px] sm:text-[10px] md:text-xs font-black text-primary uppercase tracking-wider block mb-1 ml-1">
                        <i class="fas fa-lock mr-1 text-xs"></i>
                        Password
                    </label>
                    <div class="relative">
                        <input type="password" id="signupPassword" placeholder="Create a password" 
                               class="w-full px-3 sm:px-4 py-2.5 sm:py-3 bg-amber-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-xs sm:text-sm focus:border-primary focus:outline-none transition-all pr-9 sm:pr-10 placeholder:text-gray-400 focus:ring-2 focus:ring-primary/20">
                        <button type="button" onclick="togglePassword()" class="absolute right-2 sm:right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary">
                            <i id="passwordIcon" class="fas fa-eye"></i>
                        </button>
                    </div>
                    <!-- Password Strength Indicator -->
                    <div class="mt-2">
                        <div class="flex gap-1 h-1">
                            <span class="flex-1 rounded-full bg-gray-200 dark:bg-gray-700 strength-bar" id="strengthBar1"></span>
                            <span class="flex-1 rounded-full bg-gray-200 dark:bg-gray-700 strength-bar" id="strengthBar2"></span>
                            <span class="flex-1 rounded-full bg-gray-200 dark:bg-gray-700 strength-bar" id="strengthBar3"></span>
                            <span class="flex-1 rounded-full bg-gray-200 dark:bg-gray-700 strength-bar" id="strengthBar4"></span>
                        </div>
                        <p id="strengthText" class="text-[9px] text-gray-500 mt-1">Use 8+ characters with mix of letters & numbers</p>
                    </div>
                </div>
                
                <!-- Confirm Password Field -->
                <div>
                    <label class="text-[9px] sm:text-[10px] md:text-xs font-black text-primary uppercase tracking-wider block mb-1 ml-1">
                        <i class="fas fa-check-circle mr-1 text-xs"></i>
                        Confirm Password
                    </label>
                    <div class="relative">
                        <input type="password" id="confirmPassword" placeholder="Confirm your password" 
                               class="w-full px-3 sm:px-4 py-2.5 sm:py-3 bg-amber-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-xs sm:text-sm focus:border-primary focus:outline-none transition-all placeholder:text-gray-400 focus:ring-2 focus:ring-primary/20">
                    </div>
                    <p id="matchMsg" class="text-[9px] mt-1"></p>
                </div>
                
                <!-- Terms & Conditions -->
                <div class="flex items-start gap-2">
                    <input type="checkbox" id="termsCheckbox" class="accent-primary w-3.5 h-3.5 sm:w-4 sm:h-4 rounded mt-0.5">
                    <label class="text-[9px] sm:text-[10px] md:text-xs text-gray-600 dark:text-gray-400">
                        I agree to the <a href="#" class="text-primary font-semibold hover:underline">Terms of Service</a> and <a href="#" class="text-primary font-semibold hover:underline">Privacy Policy</a>
                    </label>
                </div>
                
                <!-- Sign Up Button -->
                <button type="submit" class="w-full bg-gradient-to-r from-primary to-secondary hover:from-primary/90 hover:to-secondary/90 text-white font-bold py-2.5 sm:py-3 md:py-3.5 px-4 rounded-lg transition-all shadow-md text-xs sm:text-sm md:text-base mt-2 transform hover:scale-[1.02]">
                    <i class="fas fa-user-plus mr-2"></i>
                    Create Account
                </button>
            </form>
            
            <!-- Divider -->
            <div class="relative my-5 sm:my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
                </div>
                <div class="relative flex justify-center text-[9px] sm:text-[10px] md:text-xs">
                    <span class="bg-white dark:bg-[#2A241F] px-3 text-gray-500">or sign up with</span>
                </div>
            </div>
            
            <!-- Social Icons with Names -->
            <div class="grid grid-cols-3 gap-2 sm:gap-3 mb-5 sm:mb-6">
                <button onclick="socialSignup('google')" class="flex items-center justify-center gap-1 sm:gap-2 p-2 sm:p-2.5 md:p-3 border border-gray-200 dark:border-gray-700 rounded-lg hover:border-primary hover:text-primary transition-all group">
                    <i class="fab fa-google text-sm sm:text-base md:text-lg text-gray-600 dark:text-gray-400 group-hover:text-primary"></i>
                    <span class="text-[9px] sm:text-[10px] md:text-xs font-medium text-gray-600 dark:text-gray-400 group-hover:text-primary">Google</span>
                </button>
                <button onclick="socialSignup('apple')" class="flex items-center justify-center gap-1 sm:gap-2 p-2 sm:p-2.5 md:p-3 border border-gray-200 dark:border-gray-700 rounded-lg hover:border-primary hover:text-primary transition-all group">
                    <i class="fab fa-apple text-sm sm:text-base md:text-lg text-gray-600 dark:text-gray-400 group-hover:text-primary"></i>
                    <span class="text-[9px] sm:text-[10px] md:text-xs font-medium text-gray-600 dark:text-gray-400 group-hover:text-primary">Apple</span>
                </button>
                <button onclick="socialSignup('facebook')" class="flex items-center justify-center gap-1 sm:gap-2 p-2 sm:p-2.5 md:p-3 border border-gray-200 dark:border-gray-700 rounded-lg hover:border-primary hover:text-primary transition-all group">
                    <i class="fab fa-facebook-f text-sm sm:text-base md:text-lg text-gray-600 dark:text-gray-400 group-hover:text-primary"></i>
                    <span class="text-[9px] sm:text-[10px] md:text-xs font-medium text-gray-600 dark:text-gray-400 group-hover:text-primary">Facebook</span>
                </button>
            </div>
            
            <!-- Login Link -->
            <p class="text-center text-[10px] sm:text-xs md:text-sm text-gray-500 dark:text-gray-400">
                Already have an account? 
                <a href="login.html" class="text-primary font-bold hover:underline hover:scale-105 inline-block transition-all">
                    Sign in
                </a>
            </p>

            <!-- Footer -->
            <p class="text-center text-[8px] sm:text-[9px] md:text-xs text-gray-400 dark:text-gray-500 mt-4 sm:mt-5">
                © 2026 ARKI VIZ Studio. All rights reserved.
            </p>
        </div>
    </div>

    <script>
        // Theme Toggle Function
        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('darkMode', html.classList.contains('dark') ? 'dark' : 'light');
        }

        // Check saved dark mode
        if (localStorage.getItem('darkMode') === 'dark') {
            document.documentElement.classList.add('dark');
        }

        // Direction Toggle
        function toggleDirection() {
            const html = document.getElementById('htmlTag');
            html.dir = html.dir === 'ltr' ? 'rtl' : 'ltr';
        }

        // Password Visibility Toggle
        let passwordVisible = false;
        function togglePassword() {
            const passwordInput = document.getElementById('signupPassword');
            const icon = document.getElementById('passwordIcon');
            passwordVisible = !passwordVisible;
            passwordInput.type = passwordVisible ? 'text' : 'password';
            icon.className = passwordVisible ? 'fas fa-eye-slash' : 'fas fa-eye';
        }
        
        // Password Strength Checker
        const passwordInput = document.getElementById('signupPassword');
        const strengthBars = {
            bar1: document.getElementById('strengthBar1'),
            bar2: document.getElementById('strengthBar2'),
            bar3: document.getElementById('strengthBar3'),
            bar4: document.getElementById('strengthBar4')
        };
        const strengthText = document.getElementById('strengthText');
        
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^A-Za-z0-9]/)) strength++;
            
            // Update bars
            const bars = [strengthBars.bar1, strengthBars.bar2, strengthBars.bar3, strengthBars.bar4];
            bars.forEach((bar, i) => {
                if (i < strength) {
                    bar.classList.remove('bg-gray-200', 'dark:bg-gray-700');
                    bar.classList.add('bg-primary');
                } else {
                    bar.classList.remove('bg-primary');
                    bar.classList.add('bg-gray-200', 'dark:bg-gray-700');
                }
            });
            
            // Update text
            if (password.length === 0) {
                strengthText.textContent = 'Use 8+ characters with mix of letters & numbers';
                strengthText.className = 'text-[9px] text-gray-500 mt-1';
            } else if (strength <= 1) {
                strengthText.textContent = 'Weak - Use at least 8 characters';
                strengthText.className = 'text-[9px] text-red-500 mt-1';
            } else if (strength === 2) {
                strengthText.textContent = 'Fair - Add numbers and symbols';
                strengthText.className = 'text-[9px] text-yellow-500 mt-1';
            } else if (strength === 3) {
                strengthText.textContent = 'Good - Add special characters for strong password';
                strengthText.className = 'text-[9px] text-blue-500 mt-1';
            } else {
                strengthText.textContent = 'Strong password!';
                strengthText.className = 'text-[9px] text-green-500 mt-1';
            }
        });
        
        // Confirm Password Match Checker
        const confirmInput = document.getElementById('confirmPassword');
        const matchMsg = document.getElementById('matchMsg');
        
        confirmInput.addEventListener('input', function() {
            const password = document.getElementById('signupPassword').value;
            const confirm = this.value;
            
            if (confirm.length > 0) {
                if (password === confirm) {
                    matchMsg.textContent = '✓ Passwords match';
                    matchMsg.className = 'text-[9px] text-green-500 mt-1';
                } else {
                    matchMsg.textContent = '✗ Passwords do not match';
                    matchMsg.className = 'text-[9px] text-red-500 mt-1';
                }
            } else {
                matchMsg.textContent = '';
            }
        });
        
        // Social Signup
        function socialSignup(provider) {
            alert(`Sign up with ${provider} would redirect to OAuth. Demo mode: redirecting to dashboard.`);
            window.location.href = 'user.html';
        }
        
        // Form Submit
        document.getElementById('signupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('termsCheckbox').checked;
            
            if(!fullName) { alert('Please enter your full name'); return; }
            if(!email) { alert('Please enter your email address'); return; }
            if(!email.includes('@')) { alert('Please enter a valid email address'); return; }
            if(!password) { alert('Please create a password'); return; }
            if(password.length < 8) { alert('Password must be at least 8 characters long'); return; }
            if(password !== confirm) { alert('Passwords do not match'); return; }
            if(!terms) { alert('Please agree to the Terms of Service and Privacy Policy'); return; }
            
            alert(`Welcome to ARKI VIZ, ${fullName}!\n\nYour account has been created successfully. You can now log in to access your dashboard.\n\nDemo mode: Redirecting to login page.`);
            window.location.href = 'login.html';
        });
        
        // Initialize any required scripts
        document.addEventListener('DOMContentLoaded', function() {
            // Ensure dark mode icon is correct on load
            if (document.documentElement.classList.contains('dark')) {
                // Already handled by CSS
            }
        });
    </script>
</body>
</html>
